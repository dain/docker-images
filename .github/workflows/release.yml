name: release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip git push)'
        type: boolean
        required: false
        default: false

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      do_release: ${{ steps.version.outputs.DO_RELEASE }}
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0 # checkout tags so version in Manifest is set properly

    - name: Free up disk space
      shell: bash
      run: ./.github/bin/free-disk-space.sh

    - name: Configure Git user
      run: |
        git config user.email "releases@trinodb.io"
        git config user.name "Trino release automation"

    - name: Log in to the Container registry
      # locked to https://github.com/docker/login-action/releases/tag/v2.1.0
      uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Install crane
      uses: imjasonh/setup-crane@v0.4

    - name: Set release version
      id: version
      run: |
        # if there's a SNAPSHOT suffix, remove it and commit changes
        DO_RELEASE=false
        if grep -q '^[0-9]\+-SNAPSHOT$' version; then
          sed -i 's/^\([0-9]\+\)-SNAPSHOT$/\1/' version
          VERSION=$(cat version)
          git diff
          git commit -a -m "Release: $VERSION"
          git tag -m "" "$VERSION"
          # Verify tag was created and points to the release commit
          git show tags/"$VERSION"
          if [ "${{ inputs.dry_run }}" != "true" ]; then
            git push origin "tags/$VERSION"
          fi
          DO_RELEASE=true
        fi
        VERSION=$(cat version)
        echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
        echo "DO_RELEASE=${DO_RELEASE}" >> $GITHUB_OUTPUT

    - name: Make release
      if: steps.version.outputs.DO_RELEASE == 'true'
      env:
        VERSION: ${{ steps.version.outputs.VERSION }}
      run: |
        skipped_images=(
          testing/almalinux9-oj17-openldap-base
        )
        single_arch=(
          testing/hdp3.1-hive
          testing/hdp3.1-hive-kerberized
          testing/hdp3.1-hive-kerberized-2
          testing/hdp3.1-hive-kerberized-kms
        )
        multi_arch=(
          build/sphinx
          testing/almalinux9-oj11
          testing/almalinux9-oj17
          testing/almalinux9-oj17-openldap
          testing/almalinux9-oj17-openldap-referrals
          testing/almalinux9-oj17-openldap-active-directory
          testing/hive3.1-hive
          testing/kerberos
          testing/spark4-delta
          testing/spark4-iceberg
          testing/spark3-hudi
          testing/hive4.0-hive
        )
        referenced_images=("${skipped_images[@]}" "${single_arch[@]}" "${multi_arch[@]}")
        make meta
        read -a images < <(make list)
        export LC_ALL=C
        mapfile -t ignored < <( \
            comm -23 \
                <(printf '%s\n' "${images[@]}" | sort) \
                <(printf '%s\n' "${referenced_images[@]}" | sort) \
        )
        if [ "${#ignored[@]}" -ne 0 ]; then
          echo "Images that would not get released: ${ignored[*]}"
          echo "Must be explicitly added to either single_arch or multi_arch list or should be added to skipped list"
          exit 2
        fi
        make prepare-release

        # Build and push single_arch (amd64-only) images
        make "${single_arch[@]/%/@$VERSION}"
        single_remote=("${single_arch[@]/#/ghcr.io/trinodb/}")
        ./bin/push.sh "${single_remote[@]/%/:$VERSION}"

        # Build and push amd64 multi_arch images by digest
        docker system prune --volumes -f
        make "${multi_arch[@]/%/@$VERSION}"
        mkdir -p /tmp/digests
        for image in "${multi_arch[@]}"; do
          SAFE_NAME="${image//\//-}"
          docker save "${image}:$VERSION" | crane push - "ghcr.io/trinodb/${image}" > "/tmp/digests/${SAFE_NAME}-linux-amd64"
        done

    - name: Upload digests
      uses: actions/upload-artifact@v4
      with:
        name: digests-amd64
        path: /tmp/digests/*

  release-arm64:
    needs: release
    if: needs.release.outputs.do_release == 'true'
    runs-on: ubuntu-24.04-arm
    permissions:
      packages: write
    env:
      VERSION: ${{ needs.release.outputs.version }}
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
        ref: ${{ needs.release.outputs.version }}

    - name: Free up disk space
      run: ./.github/bin/free-disk-space.sh

    - name: Log in to the Container registry
      uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Install crane
      uses: imjasonh/setup-crane@v0.4

    - name: Build and push arm64 images
      run: |
        # hive4.0-hive excluded - amd64 only
        multi_arch=(
          build/sphinx
          testing/almalinux9-oj11
          testing/almalinux9-oj17
          testing/almalinux9-oj17-openldap
          testing/almalinux9-oj17-openldap-referrals
          testing/almalinux9-oj17-openldap-active-directory
          testing/hive3.1-hive
          testing/kerberos
          testing/spark4-delta
          testing/spark4-iceberg
          testing/spark3-hudi
        )
        make meta
        make prepare-release
        make "${multi_arch[@]/%/@$VERSION}"
        mkdir -p /tmp/digests
        for image in "${multi_arch[@]}"; do
          SAFE_NAME="${image//\//-}"
          docker save "${image}:$VERSION" | crane push - "ghcr.io/trinodb/${image}" > "/tmp/digests/${SAFE_NAME}-linux-arm64"
        done

    - name: Upload digests
      uses: actions/upload-artifact@v4
      with:
        name: digests-arm64
        path: /tmp/digests/*

  create-manifests:
    needs: [release, release-arm64]
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    env:
      VERSION: ${{ needs.release.outputs.version }}
    steps:
    - name: Log in to the Container registry
      uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Install crane
      uses: imjasonh/setup-crane@v0.4

    - name: Download digests
      uses: actions/download-artifact@v4
      with:
        path: /tmp/digests
        pattern: digests-*
        merge-multiple: true

    - name: Create and push manifests
      run: |
        multi_arch=(
          build/sphinx
          testing/almalinux9-oj11
          testing/almalinux9-oj17
          testing/almalinux9-oj17-openldap
          testing/almalinux9-oj17-openldap-referrals
          testing/almalinux9-oj17-openldap-active-directory
          testing/hive3.1-hive
          testing/kerberos
          testing/spark4-delta
          testing/spark4-iceberg
          testing/spark3-hudi
        )
        for image in "${multi_arch[@]}"; do
          SAFE_NAME="${image//\//-}"
          AMD64_DIGEST=$(cat "/tmp/digests/${SAFE_NAME}-linux-amd64")
          ARM64_DIGEST=$(cat "/tmp/digests/${SAFE_NAME}-linux-arm64")
          crane index append --tag "ghcr.io/trinodb/${image}:${VERSION}" \
            --manifest "${AMD64_DIGEST}" \
            --manifest "${ARM64_DIGEST}"
        done
        # hive4.0-hive is amd64 only
        AMD64_DIGEST=$(cat "/tmp/digests/testing-hive4.0-hive-linux-amd64")
        crane index append --tag "ghcr.io/trinodb/testing/hive4.0-hive:${VERSION}" \
          --manifest "${AMD64_DIGEST}"

  finalize:
    needs: [release, create-manifests]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Configure Git user
      run: |
        git config user.email "releases@trinodb.io"
        git config user.name "Trino release automation"

    - name: Set next development version
      env:
        VERSION: ${{ needs.release.outputs.version }}
      run: |
        NEXT_VERSION=$((VERSION + 1))
        echo "$NEXT_VERSION-SNAPSHOT" > version
        git diff
        git commit -a -m "Prepare for next development iteration"
        git show HEAD
        if [ "${{ inputs.dry_run }}" != "true" ]; then
          git push origin HEAD:master
        fi
